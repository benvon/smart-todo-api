name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    uses: benvon/reusable-workflows/.github/workflows/go-quality.yml@0a878c63c5a17372ecd27a1fd1fffd7c1b88e5d3
    with:
      quality_command: |
        make deps test lint security vulnerability-check mod-tidy-check
        go build -v -o /dev/null ./cmd/server
        go build -v -o /dev/null ./cmd/configure

  cross-build:
    name: cross-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Verify cross-platform builds
        shell: bash
        run: |
          set -euo pipefail

          for target in ./cmd/server ./cmd/configure; do
            for goos in linux darwin windows; do
              for goarch in amd64 arm64; do
                if [[ "${goos}" == "windows" && "${goarch}" == "arm64" ]]; then
                  continue
                fi

                GOOS="${goos}" GOARCH="${goarch}" go build -v -o /dev/null "${target}"
              done
            done
          done

  web-quality:
    name: web-quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Run lint
        run: npm run lint

      - name: Run security checks
        run: npx check-audit --audit-level=moderate

      - name: Check outdated packages
        run: npm outdated || true

      - name: Build frontend
        run: npm run build

      - name: Verify package-lock sync
        run: npm ci --dry-run
